<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tetris</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game">
    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div id="overlay" class="overlay hidden">
        <div id="overlayText">GAME OVER</div>
      </div>
    </div>

    <div class="side">
      <div class="panel">
        <h3>NEXT</h3>
        <canvas id="next" width="100" height="100"></canvas>
      </div>
      <div class="panel">
        <h3>SCORE</h3>
        <div id="score">0</div>
      </div>
      <div class="panel">
        <h3>LEVEL</h3>
        <div id="level">1</div>
      </div>
      <div class="panel">
        <h3>LINES</h3>
        <div id="lines">0</div>
      </div>
      <div class="panel help">
        <h3>조작법</h3>
        <p>← → : 이동</p>
        <p>↓ : 소프트 드롭</p>
        <p>↑ : 회전</p>
        <p>Space : 하드 드롭</p>
        <p>P : 일시정지</p>
      </div>
      <button id="pause">일시정지</button>
      <button id="restart">다시 시작</button>
    </div>
  </div>

  <div class="touch-controls">
    <div class="touch-row">
      <button class="tbtn" id="tLeft">←</button>
      <button class="tbtn" id="tRotate">⟳</button>
      <button class="tbtn" id="tRight">→</button>
    </div>
    <div class="touch-row">
      <button class="tbtn wide" id="tDown">↓ 소프트</button>
      <button class="tbtn wide" id="tDrop">⇊ 하드드롭</button>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
